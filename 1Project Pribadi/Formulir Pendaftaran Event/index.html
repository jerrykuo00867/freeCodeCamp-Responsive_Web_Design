<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pendaftaran Event</title>
</head>
<body>
    <header>
        <h1>Formulir Pendaftaran Web Development Bootcamp 2026</h1>
        <p>Silakan isi formulir di bawah ini dengan lengkap untuk mendaftarkan diri Anda dalam program pelatihan intensif.</p>
    </header>

    <form>
        <fieldset>
            <legend>Data Pribadi</legend>
            <input type="text" required placeholder="Contoh: Budi Santoso">
            <input type="email" required>
            <input type="rel" required>
            <input type="date" required>
            <legend>Latar Belakang & Pilihan</legend>
            <select name="Pendidikan-Akhir">
                <option value="Pilih Pendidikan">Pilih Pendidikan</option>
                <option value="SMA / SMK">SMA / SMK</option>
                <option value="Diploma (D3)">Diploma (D3)</option>
                <option value="Sarjana (S1)">Sarjana (S1)</option>
                <option value="Lainnya">Lainnya</option>
            </select>
            <p>To Be Continue</p>
        </fieldset>
    </form>
</body>
</html>
